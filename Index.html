<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jewelry Inventory</title>
<style>
  :root {
    --ink: #1c1b19;
    --paper: #faf7f2;
    --gold: #a8823c;
    --gold-deep: #8a6a2e;
    --line: #e3ddd1;
    --green: #2f4a3c;
    --red: #9c3b3b;
    --muted: #74695c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--paper);
    color: var(--ink);
  }
  header.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--ink);
    color: var(--paper);
  }
  header.topbar h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 19px;
    letter-spacing: 0.5px;
    margin: 0;
    font-weight: 600;
  }
  header.topbar .user-chip { font-size: 12px; color: var(--gold); cursor: pointer; }
  nav.tabs {
    display: flex;
    background: #fff;
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  nav.tabs button {
    flex: 1;
    padding: 12px 6px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
  }
  nav.tabs button.active { color: var(--ink); border-bottom: 2px solid var(--gold); font-weight: 600; }
  main { padding: 16px; max-width: 760px; margin: 0 auto; padding-bottom: 90px; }
  .screen { display: none; }
  .screen.active { display: block; }

  #login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .login-card { background: #fff; border: 1px solid var(--line); padding: 32px 28px; width: 100%; max-width: 320px; text-align: center; }
  .login-card h1 { font-family: Georgia, serif; margin: 0 0 4px; font-size: 22px; }
  .login-card p.sub { color: var(--muted); font-size: 13px; margin: 0 0 20px; }

  input, select, textarea {
    width: 100%;
    padding: 10px 11px;
    border: 1px solid var(--line);
    background: #fff;
    font-size: 14px;
    margin-bottom: 10px;
    border-radius: 2px;
    font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold); }
  label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 4px; }
  button.primary {
    width: 100%; padding: 11px; background: var(--ink); color: var(--paper);
    border: none; font-size: 14px; cursor: pointer; letter-spacing: 0.3px;
  }
  button.primary:hover { background: var(--gold-deep); }
  button.secondary {
    width: 100%; padding: 10px; background: none; border: 1px solid var(--ink);
    color: var(--ink); font-size: 13px; cursor: pointer;
  }
  .error-text { color: var(--red); font-size: 12px; margin: -4px 0 10px; }

  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .filters input, .filters select { margin-bottom: 0; flex: 1; min-width: 110px; }

  .summary-bar {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: var(--muted); margin-bottom: 10px;
    border-bottom: 1px solid var(--line); padding-bottom: 8px;
  }
  .summary-bar .select-all-label { display: flex; align-items: center; gap: 6px; cursor: pointer; }

  .product-card {
    background: #fff; border: 1px solid var(--line); padding: 10px 12px;
    margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
  }
  .product-card:hover { border-color: var(--gold); }
  .product-card .card-checkbox { flex: 0 0 auto; width: 18px; height: 18px; margin: 0; cursor: pointer; }
  .product-card .card-thumb {
    width: 44px; height: 44px; border-radius: 4px; object-fit: cover;
    background: #f0ece4; flex: 0 0 auto; cursor: pointer;
  }
  .product-card .card-body { flex: 1; min-width: 0; cursor: pointer; }
  .product-card .pname { font-weight: 600; font-size: 14px; }
  .product-card .pmeta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .qty-badge {
    font-size: 13px; font-weight: 700; padding: 4px 10px; border-radius: 12px;
    background: #eef3ee; color: var(--green); white-space: nowrap; cursor: pointer;
  }
  .qty-badge.low { background: #f7e9e9; color: var(--red); }

  /* Bulk action bar */
  .bulk-bar {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--ink); color: #fff;
    padding: 10px 14px; display: none;
    align-items: center; gap: 10px; z-index: 50;
    flex-wrap: wrap;
  }
  .bulk-bar.active { display: flex; }
  .bulk-bar .bulk-count { font-size: 13px; flex: 1 1 100%; }
  .bulk-bar input { width: 64px; margin: 0; padding: 8px; }
  .bulk-bar button {
    padding: 8px 12px; border: 1px solid var(--gold); background: none;
    color: #fff; font-size: 13px; cursor: pointer; border-radius: 3px;
  }
  .bulk-bar button.clear { border-color: #555; color: #ccc; }

  .modal-backdrop {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 100; align-items: flex-end; justify-content: center;
  }
  .modal-backdrop.active { display: flex; }
  .modal {
    background: #fff; width: 100%; max-width: 480px; padding: 22px;
    border-radius: 10px 10px 0 0; max-height: 88vh; overflow-y: auto;
  }
  .modal h2 { font-family: Georgia, serif; margin: 0 0 2px; font-size: 20px; }
  .modal .modal-sub { color: var(--muted); font-size: 13px; margin-bottom: 14px; }
  .modal-close { float: right; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--muted); }
  #modal-photo { width: 100%; height: 200px; object-fit: contain; object-position: center; background: #f5f2ed; border-radius: 6px; margin-bottom: 12px; display: none; }
  .qty-control { display: flex; align-items: center; gap: 12px; justify-content: center; margin: 14px 0; }
  .qty-control button { width: 44px; height: 44px; border-radius: 50%; border: 1px solid var(--ink); background: #fff; font-size: 20px; cursor: pointer; }
  .qty-control .qty-number { font-size: 28px; font-weight: 700; min-width: 50px; text-align: center; }
  .qty-set-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .qty-set-row input { margin: 0; }
  .qty-set-row button { width: auto; padding: 10px 14px; white-space: nowrap; }
  .detail-row { display: flex; justify-content: space-between; font-size: 13px; padding: 6px 0; border-bottom: 1px solid #f0ece4; }
  .detail-row span:first-child { color: var(--muted); }
  #qr-display { text-align: center; margin: 14px auto; display: flex; justify-content: center; }

  #reader { width: 100%; max-width: 420px; margin: 0 auto; }
  .scan-hint { text-align: center; color: var(--muted); font-size: 13px; margin-top: 10px; }

  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 20px;
    font-size: 13px; opacity: 0; transition: opacity 0.25s; pointer-events: none; z-index: 200;
  }
  .toast.show { opacity: 1; }
  .empty-state { text-align: center; color: var(--muted); padding: 40px 10px; font-size: 14px; }
  .spinner-wrap { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; }

  .photo-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .photo-input-row label.photo-btn {
    flex: 1; text-align: center; padding: 10px; border: 1px dashed var(--line);
    cursor: pointer; font-size: 13px; color: var(--muted); margin: 0;
  }
  .photo-input-row input[type=file] { display: none; }
  #add-photo-preview { width: 100%; max-height: 200px; object-fit: contain; background: #f5f2ed; border-radius: 6px; margin-bottom: 10px; display: none; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="screen active">
  <div class="login-card">
    <h1>Inventory</h1>
    <p class="sub">Sign in to manage stock</p>
    <input id="login-user" placeholder="Username" autocomplete="username">
    <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password">
    <div class="error-text" id="login-error"></div>
    <button class="primary" onclick="doLogin()">Sign in</button>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="screen">
  <header class="topbar">
    <h1>Jewelry Inventory</h1>
    <span class="user-chip" id="user-chip" onclick="doLogout()">Sign out</span>
  </header>
  <nav class="tabs">
    <button class="tab-btn active" data-tab="inventory" onclick="switchTab('inventory')">Inventory</button>
    <button class="tab-btn" data-tab="scan" onclick="switchTab('scan')">Scan</button>
    <button class="tab-btn" data-tab="add" onclick="switchTab('add')">Add item</button>
  </nav>

  <main>
    <div id="inventory" class="screen active">
      <div class="filters">
        <input id="f-search" placeholder="Search name / SKU" oninput="onFilterChange()">
        <select id="f-category" onchange="onFilterChange()"><option value="">All categories</option></select>
        <select id="f-location" onchange="onFilterChange()"><option value="">All locations</option></select>
        <select id="f-stock" onchange="onFilterChange()">
          <option value="">All stock</option>
          <option value="instock">In stock</option>
          <option value="low">Low (≤2)</option>
          <option value="out">Out of stock</option>
        </select>
        <select id="f-pagesize" onchange="onFilterChange()" style="min-width:90px;">
          <option value="25">Show 25</option>
          <option value="50" selected>Show 50</option>
          <option value="100">Show 100</option>
          <option value="200">Show 200</option>
        </select>
      </div>
      <div class="summary-bar">
        <label class="select-all-label">
          <input type="checkbox" id="select-all" onchange="toggleSelectAll(this.checked)">
          Select all
        </label>
        <span id="summary-count">—</span>
      </div>
      <div id="product-list"><div class="spinner-wrap">Loading inventory…</div></div>
      <div id="pagination" style="display:flex;justify-content:center;align-items:center;gap:12px;padding:14px 0;"></div>
    </div>

    <div id="scan" class="screen">
      <div id="reader"></div>
      <p class="scan-hint" id="scan-hint">Point the camera at a product's QR code.</p>
    </div>

    <div id="add" class="screen">
      <label>Photo</label>
      <img id="add-photo-preview">
      <div class="photo-input-row">
        <label class="photo-btn">Take photo
          <input type="file" accept="image/*" capture="environment" onchange="handlePhotoSelect(event)">
        </label>
        <label class="photo-btn">Choose from gallery
          <input type="file" accept="image/*" onchange="handlePhotoSelect(event)">
        </label>
      </div>

      <label>Product name</label>
      <input id="add-name" placeholder="e.g. Round earrings with zircon">
      <label>SKU (optional — leave blank to auto-generate)</label>
      <input id="add-sku" placeholder="auto-generated from name, e.g. REWZ-0001">
      <label>Category</label>
      <select id="add-category"><option value="">Select category</option></select>
      <label>Material</label>
      <select id="add-material"><option value="">Select material</option></select>
      <label>Gemstone</label>
      <select id="add-gemstone"><option value="">Select gemstone</option></select>
      <label>Weight (g)</label>
      <input id="add-weight" type="number" step="0.01">
      <label>Starting quantity</label>
      <input id="add-quantity" type="number" value="1">
      <label>Location / shelf</label>
      <input id="add-location" placeholder="e.g. Display case 2">
      <label>Notes</label>
      <textarea id="add-notes" rows="2"></textarea>
      <button class="primary" onclick="submitAddProduct()">Save & generate QR code</button>

      <div id="new-product-result" style="display:none; margin-top:24px; text-align:center; border-top:1px solid var(--line); padding-top:20px;">
        <p style="font-size:13px; color:var(--muted);">Item saved. Print this label and attach it to the product.</p>
        <div id="new-qr"></div>
        <p id="new-product-id" style="font-weight:600; margin-top:8px;"></p>
        <button class="secondary" onclick="printLabelFor(lastAddedProduct)">Print label</button>
        <button class="secondary" style="margin-top:8px;" onclick="resetAddForm()">Add another item</button>
      </div>
    </div>
  </main>
</div>

<!-- Bulk action bar -->
<div class="bulk-bar" id="bulk-bar">
  <div class="bulk-count" id="bulk-count">0 selected</div>
  <span style="font-size:12px; color:#aaa;">Pieces:</span>
  <input type="number" id="bulk-amount" value="1" min="1" style="width:60px;">
  <button onclick="applyBulk(1)">+ Add to stock</button>
  <button onclick="applyBulk(-1)">− Remove from stock</button>
  <button class="clear" onclick="clearSelection()">✕ Clear</button>
</div>

<div class="modal-backdrop" id="modal-backdrop" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <img id="modal-photo">
    <h2 id="modal-name"></h2>
    <p class="modal-sub" id="modal-sku"></p>

    <div class="qty-control">
      <button onclick="changeQty(-1)">−</button>
      <div class="qty-number" id="modal-qty">0</div>
      <button onclick="changeQty(1)">+</button>
    </div>
    <div class="qty-set-row">
      <input type="number" id="modal-qty-set" placeholder="Set exact quantity">
      <button class="secondary" onclick="applySetQty()">Set</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px;">
      <input type="number" id="modal-qty-change" placeholder="How many pieces" min="1" style="margin:0;flex:1;">
      <button onclick="applyModalChange(1)" style="padding:10px 14px;background:var(--green);color:#fff;border:none;cursor:pointer;white-space:nowrap;font-size:13px;">+ Add</button>
      <button onclick="applyModalChange(-1)" style="padding:10px 14px;background:var(--red);color:#fff;border:none;cursor:pointer;white-space:nowrap;font-size:13px;">− Remove</button>
    </div>

    <div class="detail-row"><span>Category</span><span id="modal-category"></span></div>
    <div class="detail-row"><span>Material</span><span id="modal-material"></span></div>
    <div class="detail-row"><span>Gemstone</span><span id="modal-gemstone"></span></div>
    <div class="detail-row"><span>Weight</span><span id="modal-weight"></span></div>
    <div class="detail-row"><span>Location</span><span id="modal-location"></span></div>
    <div class="detail-row"><span>Last updated</span><span id="modal-updated"></span></div>

    <div id="qr-display"></div>
    <button class="secondary" onclick="printLabelFor(activeModalProduct)">Print QR label</button>
  </div>
</div>


<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbyofI50DPNi7ttIteQEJa1Lz_KhfkLLCIFZTHtvH7f-IUfxz_GFU_jFBsaY2XMz4dguog/exec';
  let currentUser = JSON.parse(localStorage.getItem('jw_user') || 'null');
  let allProducts = [];
  let options = { categories: [], materials: [], gemstones: [] };
  let activeModalId = null;
  let activeModalProduct = null;
  let lastAddedProduct = null;
  let selectedIds = new Set();
  let html5QrCode = null;
  let scanCooldown = false;
  let pendingPhotoDataUrl = '';
  let currentPage = 1;
  let photoObserver = null;

  // ---------- BOOT ----------
  function boot() {
    if (currentUser) {
      document.getElementById('user-chip').textContent = currentUser.username + ' · Sign out';
      show('app-screen');
      loadOptions();
      loadProducts();
    } else {
      show('login-screen');
    }
  }
  function show(id) {
    document.querySelectorAll('body > .screen').forEach(s => {
      s.classList.remove('active');
      s.style.display = 'none';
    });
    const target = document.getElementById(id);
    target.classList.add('active');
    target.style.display = '';
  }

  // ---------- API HELPERS ----------
  async function apiGet(action, params) {
    const qs = new URLSearchParams({ action, ...(params || {}) });
    const res = await fetch(`${API_URL}?${qs.toString()}`);
    return res.json();
  }
  async function apiPost(action, payload) {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight
      body: JSON.stringify({ action, ...(payload || {}) })
    });
    return res.json();
  }

  // ---------- LOGIN ----------
  async function doLogin() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value;
    if (!u || !p) {
      document.getElementById('login-error').textContent = 'Enter a username and password.';
      return;
    }
    document.getElementById('login-error').textContent = 'Signing in…';
    try {
      const res = await apiPost('authenticate', { username: u, password: p });
      if (res.ok) {
        currentUser = res;
        localStorage.setItem('jw_user', JSON.stringify(res));
        document.getElementById('user-chip').textContent = res.username + ' · Sign out';
        document.getElementById('login-error').textContent = '';
        show('app-screen');
        loadOptions();
        loadProducts();
      } else {
        document.getElementById('login-error').textContent = 'Incorrect username or password.';
      }
    } catch (err) {
      document.getElementById('login-error').textContent = 'Could not reach the API. Check the URL and your connection.';
    }
  }

  function doLogout() {
    currentUser = null;
    localStorage.removeItem('jw_user');
    show('login-screen');
  }

  // ---------- TABS ----------
  function switchTab(tab) {
    document.querySelectorAll('main > .screen').forEach(s => s.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    if (tab === 'scan') startScanner();
    else stopScanner();
  }

  // ---------- OPTIONS (dropdowns) ----------
  async function loadOptions() {
    try {
      const res = await apiGet('getOptions');
      if (res.error) throw new Error(res.error);
      options = res;
      fillSelect('add-category', options.categories, 'Select category');
      fillSelect('add-material', options.materials, 'Select material');
      fillSelect('add-gemstone', options.gemstones, 'Select gemstone');
    } catch (err) {
      showToast('Could not load category/material lists: ' + err.message);
    }
  }
  function fillSelect(id, values, placeholder) {
    const sel = document.getElementById(id);
    sel.innerHTML = `<option value="">${placeholder}</option>` + values.map(v => `<option>${escapeHtml(v)}</option>`).join('');
  }

  // ---------- INVENTORY ----------
  async function loadProducts() {
    document.getElementById('product-list').innerHTML = '<div class="spinner-wrap">Loading inventory…</div>';
    try {
      const products = await apiGet('getProducts');
      if (products.error) throw new Error(products.error);
      allProducts = products;
      populateFilterOptions();
      renderProducts();
    } catch (err) {
      document.getElementById('product-list').innerHTML =
        `<div class="empty-state">Could not load inventory.<br>${escapeHtml(err.message)}</div>`;
    }
  }

  function populateFilterOptions() {
    const cats = [...new Set(allProducts.map(p => p.Category).filter(Boolean))].sort();
    const locs = [...new Set(allProducts.map(p => p.Location).filter(Boolean))].sort();
    document.getElementById('f-category').innerHTML = '<option value="">All categories</option>' + cats.map(c => `<option>${escapeHtml(c)}</option>`).join('');
    document.getElementById('f-location').innerHTML = '<option value="">All locations</option>' + locs.map(l => `<option>${escapeHtml(l)}</option>`).join('');
  }

  function getFiltered() {
    const search = document.getElementById('f-search').value.toLowerCase();
    const cat = document.getElementById('f-category').value;
    const loc = document.getElementById('f-location').value;
    const stockFilter = document.getElementById('f-stock').value;

    return allProducts.filter(p => {
      if (search && !(`${p.Name} ${p.SKU}`.toLowerCase().includes(search))) return false;
      if (cat && p.Category !== cat) return false;
      if (loc && p.Location !== loc) return false;
      const qty = Number(p.Quantity) || 0;
      if (stockFilter === 'instock' && qty <= 0) return false;
      if (stockFilter === 'low' && !(qty > 0 && qty <= 2)) return false;
      if (stockFilter === 'out' && qty > 0) return false;
      return true;
    });
  }

  function onFilterChange() {
    currentPage = 1;
    renderProducts();
  }

  function renderProducts() {
    const filtered = getFiltered();
    const pageSize = Number(document.getElementById('f-pagesize').value) || 50;
    const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;
    const pageItems = filtered.slice((currentPage - 1) * pageSize, currentPage * pageSize);

    const list = document.getElementById('product-list');
    document.getElementById('summary-count').textContent =
      `${filtered.length} item${filtered.length !== 1 ? 's' : ''}` +
      (totalPages > 1 ? ` · page ${currentPage}/${totalPages}` : '');

    if (!filtered.length) {
      list.innerHTML = '<div class="empty-state">No items match these filters.</div>';
      document.getElementById('pagination').innerHTML = '';
      updateBulkBar();
      return;
    }

    list.innerHTML = pageItems.map(p => {
      const qty = Number(p.Quantity) || 0;
      const lowClass = qty <= 2 ? 'low' : '';
      const checked = selectedIds.has(p.ID) ? 'checked' : '';
      // Thumb uses a placeholder div; photo loaded lazily via IntersectionObserver
      return `<div class="product-card">
        <input type="checkbox" class="card-checkbox" ${checked} onchange="toggleSelect('${p.ID}', this.checked)">
        <div class="card-thumb lazy-thumb" data-id="${p.ID}" onclick="openModal('${p.ID}')"></div>
        <div class="card-body" onclick="openModal('${p.ID}')">
          <div class="pname">${escapeHtml(p.Name || '(unnamed)')}</div>
          <div class="pmeta">${escapeHtml(p.SKU || p.ID)} · ${escapeHtml(p.Category || '—')}</div>
        </div>
        <div class="qty-badge ${lowClass}" onclick="openModal('${p.ID}')">${qty}</div>
      </div>`;
    }).join('');

    renderPagination(totalPages);
    updateBulkBar();
    setupLazyPhotos();
  }

  function renderPagination(totalPages) {
    const pag = document.getElementById('pagination');
    if (totalPages <= 1) { pag.innerHTML = ''; return; }
    const btnStyle = 'padding:7px 14px;border:1px solid var(--line);background:#fff;cursor:pointer;font-size:13px;';
    const activeBtnStyle = 'padding:7px 14px;border:1px solid var(--gold);background:var(--gold);color:#fff;cursor:default;font-size:13px;';
    let html = `<button style="${btnStyle}" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹ Prev</button>`;
    for (let i = 1; i <= totalPages; i++) {
      if (totalPages > 7 && Math.abs(i - currentPage) > 2 && i !== 1 && i !== totalPages) {
        if (i === 2 || i === totalPages - 1) html += `<span style="padding:0 4px;">…</span>`;
        continue;
      }
      html += `<button style="${i === currentPage ? activeBtnStyle : btnStyle}" onclick="goPage(${i})">${i}</button>`;
    }
    html += `<button style="${btnStyle}" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>Next ›</button>`;
    pag.innerHTML = html;
  }

  function goPage(n) {
    const filtered = getFiltered();
    const pageSize = Number(document.getElementById('f-pagesize').value) || 50;
    const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
    currentPage = Math.max(1, Math.min(n, totalPages));
    renderProducts();
    window.scrollTo(0, 0);
  }

  // Lazy photo loading — loads photo only when the thumb scrolls into view
  function setupLazyPhotos() {
    if (photoObserver) photoObserver.disconnect();
    photoObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        const el = entry.target;
        const id = el.dataset.id;
        if (!id || el.dataset.loaded) return;
        el.dataset.loaded = '1';
        photoObserver.unobserve(el);
        // Check if we already have photo in memory
        const p = allProducts.find(x => x.ID === id);
        if (p && p.PhotoData) {
          applyThumb(el, p.PhotoData);
        } else if (p) {
          // Fetch photo from API
          apiGet('getPhoto', { id }).then(res => {
            if (res.photo) {
              p.PhotoData = res.photo; // cache it
              applyThumb(el, res.photo);
            }
          }).catch(() => {});
        }
      });
    }, { rootMargin: '100px' });

    document.querySelectorAll('.lazy-thumb').forEach(el => photoObserver.observe(el));
  }

  function applyThumb(el, dataUrl) {
    el.style.backgroundImage = `url(${dataUrl})`;
    el.style.backgroundSize = 'cover';
    el.style.backgroundPosition = 'center';
  }

  // ---------- SELECTION / BULK ACTIONS ----------
  function toggleSelect(id, checked) {
    if (checked) selectedIds.add(id); else selectedIds.delete(id);
    updateBulkBar();
  }
  function toggleSelectAll(checked) {
    const filtered = getFiltered();
    if (checked) filtered.forEach(p => selectedIds.add(p.ID));
    else filtered.forEach(p => selectedIds.delete(p.ID));
    renderProducts(); // keep current page
  }
  function clearSelection() {
    selectedIds.clear();
    document.getElementById('select-all').checked = false;
    renderProducts();
  }
  function updateBulkBar() {
    const bar = document.getElementById('bulk-bar');
    if (selectedIds.size > 0) {
      bar.classList.add('active');
      document.getElementById('bulk-count').textContent = `${selectedIds.size} selected`;
    } else {
      bar.classList.remove('active');
    }
  }
  async function applyBulk(sign) {
    const amount = Math.abs(Number(document.getElementById('bulk-amount').value)) || 1;
    const ids = [...selectedIds];
    if (!ids.length) return;

    // Calculate new quantities on the frontend using allProducts (which we know is correct)
    // then call setQuantity so the server just writes the value, no read needed
    const updates = ids.map(id => {
      const p = allProducts.find(x => x.ID === id);
      const currentQty = Number(p ? p.Quantity : 0);
      const newQty = Math.max(0, currentQty + (sign * amount));
      return { id, newQty };
    });

    showToast('Updating…');
    try {
      // Run all setQuantity calls in parallel
      await Promise.all(updates.map(u =>
        apiPost('setQuantity', { id: u.id, quantity: u.newQty, username: currentUser ? currentUser.username : '' })
      ));
      showToast(`${sign > 0 ? 'Added' : 'Removed'} ${amount} on ${ids.length} item${ids.length !== 1 ? 's' : ''}`);
      clearSelection();
      await loadProducts();
    } catch (err) {
      showToast('Bulk update failed: ' + err.message);
    }
  }

  // ---------- MODAL ----------
  function openModal(id) {
    const p = allProducts.find(x => x.ID === id);
    if (!p) return;
    activeModalId = id;
    activeModalProduct = p;
    document.getElementById('modal-name').textContent = p.Name || '(unnamed)';
    document.getElementById('modal-sku').textContent = (p.SKU || p.ID);
    document.getElementById('modal-qty').textContent = Number(p.Quantity) || 0;
    document.getElementById('modal-qty-set').value = '';
    document.getElementById('modal-category').textContent = p.Category || '—';
    document.getElementById('modal-material').textContent = p.Material || '—';
    document.getElementById('modal-gemstone').textContent = p.Gemstone || '—';
    document.getElementById('modal-weight').textContent = p.WeightGrams ? p.WeightGrams + ' g' : '—';
    document.getElementById('modal-location').textContent = p.Location || '—';
    document.getElementById('modal-updated').textContent = p.LastUpdated ? new Date(p.LastUpdated).toLocaleString() : '—';

    const photoEl = document.getElementById('modal-photo');
    photoEl.style.display = 'none';
    if (p.PhotoData) {
      photoEl.src = p.PhotoData;
      photoEl.style.display = 'block';
    } else {
      // Fetch photo lazily if not yet loaded
      apiGet('getPhoto', { id }).then(res => {
        if (res.photo) {
          p.PhotoData = res.photo;
          photoEl.src = res.photo;
          photoEl.style.display = 'block';
          // Also update the thumb in the list if visible
          const thumb = document.querySelector(`.lazy-thumb[data-id="${id}"]`);
          if (thumb) applyThumb(thumb, res.photo);
        }
      }).catch(() => {});
    }

    const qrDiv = document.getElementById('qr-display');
    qrDiv.innerHTML = '';
    new QRCode(qrDiv, { text: p.ID, width: 140, height: 140 });

    document.getElementById('modal-backdrop').classList.add('active');
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('active');
    activeModalId = null;
    activeModalProduct = null;
  }

  async function changeQty(delta) {
    if (!activeModalId) return;
    const qtyEl = document.getElementById('modal-qty');
    const newQty = Math.max(0, Number(qtyEl.textContent) + delta);
    qtyEl.textContent = newQty;
    try {
      const res = await apiPost('setQuantity', { id: activeModalId, quantity: newQty, username: currentUser ? currentUser.username : '' });
      if (res.ok) {
        const p = allProducts.find(x => x.ID === activeModalId);
        if (p) p.Quantity = res.newQuantity;
        renderProducts();
        showToast(delta > 0 ? 'Added 1' : 'Removed 1');
      }
    } catch (err) { showToast('Network error — change not saved'); }
  }

  async function applySetQty() {
    if (!activeModalId) return;
    const val = document.getElementById('modal-qty-set').value;
    if (val === '') return;
    const newQty = Math.max(0, Number(val));
    try {
      const res = await apiPost('setQuantity', { id: activeModalId, quantity: newQty, username: currentUser ? currentUser.username : '' });
      if (res.ok) {
        document.getElementById('modal-qty').textContent = res.newQuantity;
        const p = allProducts.find(x => x.ID === activeModalId);
        if (p) p.Quantity = res.newQuantity;
        renderProducts();
        showToast('Quantity set to ' + res.newQuantity);
      }
    } catch (err) { showToast('Network error — change not saved'); }
  }

  async function applyModalChange(sign) {
    if (!activeModalId) return;
    const amount = Math.abs(Number(document.getElementById('modal-qty-change').value));
    if (!amount || amount < 1) { showToast('Enter how many pieces'); return; }
    const qtyEl = document.getElementById('modal-qty');
    const newQty = Math.max(0, Number(qtyEl.textContent) + (sign * amount));
    qtyEl.textContent = newQty;
    document.getElementById('modal-qty-change').value = '';
    try {
      const res = await apiPost('setQuantity', { id: activeModalId, quantity: newQty, username: currentUser ? currentUser.username : '' });
      if (res.ok) {
        const p = allProducts.find(x => x.ID === activeModalId);
        if (p) p.Quantity = res.newQuantity;
        renderProducts();
        showToast(sign > 0 ? `Added ${amount}` : `Removed ${amount}`);
      }
    } catch (err) { showToast('Network error — change not saved'); }
  }

  // ---------- PHOTO CAPTURE (Add form) ----------
  function handlePhotoSelect(event) {
    const file = event.target.files[0];
    if (!file) return;
    const img = new Image();
    const reader = new FileReader();
    reader.onload = e => {
      img.onload = () => {
        // Resize/compress to max 300px so it fits in a Sheets cell
        const maxDim = 300;
        let { width, height } = img;
        if (width > height && width > maxDim) { height *= maxDim / width; width = maxDim; }
        else if (height > maxDim) { width *= maxDim / height; height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        pendingPhotoDataUrl = canvas.toDataURL('image/jpeg', 0.75);
        const preview = document.getElementById('add-photo-preview');
        preview.src = pendingPhotoDataUrl;
        preview.style.display = 'block';
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  // ---------- ADD PRODUCT ----------
  async function submitAddProduct() {
    const name = document.getElementById('add-name').value.trim();
    if (!name) { showToast('Enter a product name'); return; }
    const product = {
      name: name,
      sku: document.getElementById('add-sku').value.trim(),
      category: document.getElementById('add-category').value,
      material: document.getElementById('add-material').value,
      gemstone: document.getElementById('add-gemstone').value,
      weight: document.getElementById('add-weight').value,
      quantity: document.getElementById('add-quantity').value || 0,
      location: document.getElementById('add-location').value.trim(),
      notes: document.getElementById('add-notes').value.trim(),
      photoBase64: pendingPhotoDataUrl || ''
    };
    try {
      const saved = await apiPost('addProduct', { product });
      if (saved.error) throw new Error(saved.error);
      allProducts.push(saved);
      lastAddedProduct = saved;
      document.getElementById('new-qr').innerHTML = '';
      new QRCode(document.getElementById('new-qr'), { text: saved.ID, width: 160, height: 160 });
      document.getElementById('new-product-id').textContent = saved.SKU || saved.ID;
      document.getElementById('new-product-result').style.display = 'block';
      showToast('Item saved as ' + (saved.SKU || saved.ID));
    } catch (err) {
      showToast('Could not save: ' + err.message);
    }
  }

  function resetAddForm() {
    ['add-name','add-sku','add-category','add-material','add-gemstone','add-weight','add-location','add-notes']
      .forEach(id => document.getElementById(id).value = '');
    document.getElementById('add-quantity').value = 1;
    document.getElementById('new-product-result').style.display = 'none';
    document.getElementById('add-photo-preview').style.display = 'none';
    document.getElementById('add-photo-preview').src = '';
    pendingPhotoDataUrl = '';
  }

  // ---------- PRINT LABEL ----------
  function printLabelFor(product) {
    if (!product) return;

    const tempDiv = document.createElement('div');
    tempDiv.style.cssText = 'position:fixed;left:-9999px;top:0';
    document.body.appendChild(tempDiv);
    new QRCode(tempDiv, { text: product.ID, width: 180, height: 180 });

    setTimeout(() => {
      const canvas = tempDiv.querySelector('canvas');
      const qrDataUrl = canvas ? canvas.toDataURL() : '';
      document.body.removeChild(tempDiv);

      const name = (product.Name || '').replace(/</g,'&lt;');
      const sku  = (product.SKU || product.ID).replace(/</g,'&lt;');
      const loc  = (product.Location || '').replace(/</g,'&lt;');

      const win = window.open('', '_blank', 'width=300,height=380,toolbar=0,menubar=0,scrollbars=0,resizable=0');
      if (!win) { showToast('Allow popups for this site to print labels'); return; }

      win.document.write(`<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
  @page {
    size: 50mm 62mm;
    margin: 0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 50mm;
    background: #fff;
    font-family: Arial, sans-serif;
  }
  .label {
    width: 50mm;
    padding: 3mm 2mm 2mm;
    text-align: center;
  }
  .label img {
    width: 44mm; height: 44mm;
    display: block; margin: 0 auto;
  }
  .name { font-size: 8pt; font-weight: bold; margin-top: 2mm; line-height: 1.3; }
  .sku  { font-size: 7pt; color: #333; margin-top: 1mm; }
  .loc  { font-size: 7pt; color: #555; margin-top: 1mm; }
  .print-btn {
    display: block; width: 100%; margin-top: 4mm; padding: 3mm;
    background: #1c1b19; color: #fff; border: none;
    font-size: 12pt; cursor: pointer; font-family: Arial, sans-serif;
  }
  @media print {
    .print-btn { display: none !important; }
    html, body { width: 50mm; }
  }
</style></head><body>
<div class="label">
  <img src="${qrDataUrl}">
  <div class="name">${name}</div>
  <div class="sku">${sku}</div>
  ${loc ? `<div class="loc">${loc}</div>` : ''}
</div>
<button class="print-btn" onclick="window.print()">🖨 Print label</button>
</body></html>`);
      win.document.close();
    }, 250);
  }

  // ---------- SCAN ----------
  function startScanner() {
    if (html5QrCode) return;
    const hint = document.getElementById('scan-hint');
    if (!window.isSecureContext) {
      hint.textContent = 'Camera requires HTTPS. Make sure you opened this page via your https:// link, not a local file.';
      return;
    }
    html5QrCode = new Html5Qrcode('reader');
    html5QrCode.start(
      { facingMode: 'environment' },
      { fps: 10, qrbox: 220 },
      onScanSuccess
    ).catch(err => {
      hint.textContent = 'Camera unavailable: ' + err + '. Check that you allowed camera access for this site in your browser settings.';
    });
  }

  function stopScanner() {
    if (html5QrCode) {
      html5QrCode.stop().then(() => { html5QrCode = null; }).catch(() => { html5QrCode = null; });
    }
  }

  function onScanSuccess(decodedText) {
    if (scanCooldown) return;
    scanCooldown = true;
    setTimeout(() => scanCooldown = false, 1500);
    const p = allProducts.find(x => x.ID === decodedText);
    if (p) {
      switchToTabAndOpen('inventory', p.ID);
    } else {
      showToast('No product found for this code');
    }
  }
  function switchToTabAndOpen(tab, id) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('main > .screen').forEach(s => s.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
    stopScanner();
    openModal(id);
  }

  // ---------- UTIL ----------
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  }

  document.getElementById('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  boot();
</script>
</body>
</html>
